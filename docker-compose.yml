services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: VMB1298
      POSTGRES_DB: diploma
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./Server
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      SECRET_KEY: random_secret_key123
      REFRESH_SECRET_KEY: random_secret_key_refresh
      SAVE_KEY: very_secret_key
      
      DB_NAME: diploma
      DB_USER: postgres
      DB_PASSWORD: VMB1298
      DB_PORT: 5432
      DB_HOST: db
      
      DATABASE_URL: postgres://postgres:VMB1298@db:5432/diploma
    depends_on:
      - db

  frontend:
    build: ./Client
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data: